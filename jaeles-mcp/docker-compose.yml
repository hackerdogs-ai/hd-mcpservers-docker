version: "3.8"

services:
  jaeles-mcp:
    image: hackerdogs/jaeles-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jaeles-mcp
    ports:
      - "8232:8232"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8232
    restart: unless-stopped
