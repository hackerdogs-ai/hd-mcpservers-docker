version: "3.8"

services:
  sublist3r-mcp:
    image: hackerdogs/sublist3r-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sublist3r-mcp
    ports:
      - "8301:8301"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8301
    restart: unless-stopped
