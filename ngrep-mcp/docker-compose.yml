version: "3.8"

services:
  ngrep-mcp:
    image: hackerdogs/ngrep-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ngrep-mcp
    ports:
      - "8314:8314"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8314
    restart: unless-stopped
