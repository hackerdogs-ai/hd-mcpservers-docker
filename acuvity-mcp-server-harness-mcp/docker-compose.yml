version: "3.8"

services:
  acuvity-mcp-server-harness-mcp:
    image: hackerdogs/acuvity-mcp-server-harness-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-harness-mcp
    ports:
      - "8426:8426"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8426
    restart: unless-stopped
