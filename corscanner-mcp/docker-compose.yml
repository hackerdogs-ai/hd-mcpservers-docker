version: "3.8"

services:
  corscanner-mcp:
    image: hackerdogs/corscanner-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corscanner-mcp
    ports:
      - "8292:8292"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8292
    restart: unless-stopped
