version: "3.8"

services:
  threat-hunting-mcp:
    image: hackerdogs/threat-hunting-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threat-hunting-mcp
    ports:
      - "8345:8345"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8345
    restart: unless-stopped
