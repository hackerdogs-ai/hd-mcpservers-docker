version: "3.8"

services:
  scrapy-mcp:
    image: hackerdogs/scrapy-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scrapy-mcp
    ports:
      - "8526:8526"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8526
    restart: unless-stopped
