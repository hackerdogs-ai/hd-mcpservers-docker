version: "3.8"

services:
  wfuzz-mcp:
    image: hackerdogs/wfuzz-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wfuzz-mcp
    ports:
      - "8224:8224"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8224
    restart: unless-stopped
