version: "3.8"

services:
  gospider-mcp:
    image: hackerdogs/gospider-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gospider-mcp
    ports:
      - "8350:8350"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8350
    restart: unless-stopped
