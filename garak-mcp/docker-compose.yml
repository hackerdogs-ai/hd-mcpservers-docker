version: "3.8"

services:
  garak-mcp:
    image: hackerdogs/garak-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garak-mcp
    ports:
      - "8352:8352"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8352
    restart: unless-stopped
