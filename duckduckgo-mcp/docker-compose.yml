version: "3.8"

services:
  duckduckgo-mcp:
    image: hackerdogs/duckduckgo-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: duckduckgo-mcp
    ports:
      - "8413:8413"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8413
    restart: unless-stopped
