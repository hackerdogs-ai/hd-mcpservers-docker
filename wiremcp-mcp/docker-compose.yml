version: "3.8"

services:
  wiremcp-mcp:
    image: hackerdogs/wiremcp-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wiremcp-mcp
    ports:
      - "8458:8458"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8458
    restart: unless-stopped
