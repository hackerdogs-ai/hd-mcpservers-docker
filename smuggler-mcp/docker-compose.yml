version: "3.8"

services:
  smuggler-mcp:
    image: hackerdogs/smuggler-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smuggler-mcp
    ports:
      - "8291:8291"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8291
    restart: unless-stopped
