version: "3.8"

services:
  scoutsuite-mcp:
    image: hackerdogs/scoutsuite-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scoutsuite-mcp
    ports:
      - "8251:8251"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8251
    restart: unless-stopped
