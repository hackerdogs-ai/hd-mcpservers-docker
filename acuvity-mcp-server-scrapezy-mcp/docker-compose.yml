version: "3.8"

services:
  acuvity-mcp-server-scrapezy-mcp:
    image: hackerdogs/acuvity-mcp-server-scrapezy-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-scrapezy-mcp
    ports:
      - "8450:8450"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8450
    restart: unless-stopped
