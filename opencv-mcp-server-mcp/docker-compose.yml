version: "3.8"

services:
  opencv-mcp-server-mcp:
    image: hackerdogs/opencv-mcp-server-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencv-mcp-server-mcp
    ports:
      - "8440:8440"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8440
    restart: unless-stopped
