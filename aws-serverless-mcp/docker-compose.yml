version: "3.8"
services:
  aws-serverless-mcp:
    image: hackerdogs/aws-serverless-mcp:latest
    build: .
    ports:
      - "8623:8623"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8623
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
