version: "3.8"

services:
  polygon-mcp:
    image: hackerdogs/polygon-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polygon-mcp
    ports:
      - "8445:8445"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8445
    restart: unless-stopped
