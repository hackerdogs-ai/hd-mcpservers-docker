version: "3.8"

services:
  acuvity-mcp-server-notion-mcp:
    image: hackerdogs/acuvity-mcp-server-notion-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-notion-mcp
    ports:
      - "8437:8437"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8437
    restart: unless-stopped
