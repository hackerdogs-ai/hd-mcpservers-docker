version: "3.8"

services:
  scan-url-mcp:
    image: hackerdogs/scan-url-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scan-url-mcp
    ports:
      - "8449:8449"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8449
    restart: unless-stopped
