version: "3.8"
services:
  aws-core-mcp:
    image: hackerdogs/aws-core-mcp:latest
    build: .
    ports:
      - "8609:8609"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8609
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
