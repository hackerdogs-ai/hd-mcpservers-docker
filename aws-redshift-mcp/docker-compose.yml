version: "3.8"
services:
  aws-redshift-mcp:
    image: hackerdogs/aws-redshift-mcp:latest
    build: .
    ports:
      - "8621:8621"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8621
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
