version: "3.8"

services:
  acuvity-mcp-server-firecrawl-mcp:
    image: hackerdogs/acuvity-mcp-server-firecrawl-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-firecrawl-mcp
    ports:
      - "8421:8421"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8421
    restart: unless-stopped
