version: "3.8"

services:
  qsreplace-mcp:
    image: hackerdogs/qsreplace-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qsreplace-mcp
    ports:
      - "8227:8227"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8227
    restart: unless-stopped
