version: "3.8"

services:
  acuvity-mcp-server-chroma-mcp:
    image: hackerdogs/acuvity-mcp-server-chroma-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-chroma-mcp
    ports:
      - "8408:8408"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8408
    restart: unless-stopped
