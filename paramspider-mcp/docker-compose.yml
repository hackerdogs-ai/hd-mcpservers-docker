version: "3.8"

services:
  paramspider-mcp:
    image: hackerdogs/paramspider-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paramspider-mcp
    ports:
      - "8226:8226"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8226
    restart: unless-stopped
