version: "3.8"
services:
  aws-documentdb-mcp:
    image: hackerdogs/aws-documentdb-mcp:latest
    build: .
    ports:
      - "8611:8611"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8611
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
