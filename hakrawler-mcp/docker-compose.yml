version: "3.8"

services:
  hakrawler-mcp:
    image: hackerdogs/hakrawler-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hakrawler-mcp
    ports:
      - "8217:8217"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8217
    restart: unless-stopped
