version: "3.8"

services:
  cloudmapper-mcp:
    image: hackerdogs/cloudmapper-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloudmapper-mcp
    ports:
      - "8268:8268"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8268
    restart: unless-stopped
