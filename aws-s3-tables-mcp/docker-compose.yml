version: "3.8"
services:
  aws-s3-tables-mcp:
    image: hackerdogs/aws-s3-tables-mcp:latest
    build: .
    ports:
      - "8622:8622"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8622
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
