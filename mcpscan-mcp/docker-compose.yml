version: "3.8"

services:
  mcpscan-mcp:
    image: hackerdogs/mcpscan-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcpscan-mcp
    ports:
      - "8296:8296"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8296
    restart: unless-stopped
