version: "3.8"

services:
  ipinfo-mcp:
    image: hackerdogs/ipinfo-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ipinfo-mcp
    ports:
      - "8351:8351"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8351
    restart: unless-stopped
