version: "3.8"

services:
  ramparts-mcp:
    image: hackerdogs/ramparts-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ramparts-mcp
    ports:
      - "8295:8295"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8295
    restart: unless-stopped
