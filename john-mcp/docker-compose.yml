version: "3.8"

services:
  john-mcp:
    image: hackerdogs/john-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: john-mcp
    volumes:
      - ./output:/app/output
    ports:
      - "8234:8234"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8234
    restart: unless-stopped
