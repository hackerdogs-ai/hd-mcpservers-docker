version: "3.8"

services:
  evil-winrm-mcp:
    image: hackerdogs/evil-winrm-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evil-winrm-mcp
    ports:
      - "8263:8263"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8263
    restart: unless-stopped
