version: "3.8"

services:
  acuvity-mcp-server-atlas-docs-mcp:
    image: hackerdogs/acuvity-mcp-server-atlas-docs-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-atlas-docs-mcp
    ports:
      - "8403:8403"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8403
    restart: unless-stopped
