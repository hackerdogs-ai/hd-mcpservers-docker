services:
  serpapi-good-local-results-ai:
    # This compose expects the Google Local Results AI Server source code to exist locally.
    # By default it looks for: <hackerdogs-core>/google-local-results-ai-server
    #
    # Override by setting GLRAI_CONTEXT in your environment (.env) to point at the server folder.
    # Example:
    #   GLRAI_CONTEXT=/absolute/path/to/google-local-results-ai-server
    build:
      context: ${GLRAI_CONTEXT:-../../../../google-local-results-ai-server}
      dockerfile: Dockerfile
    image: google-local-results-ai-server:local
    container_name: serpapi-good-local-results-ai
    ports:
      - "8000:8000"
    environment:
      # Required: loaded by the start script from repo root .env
      - MASTER_KEY=${MASTER_KEY:?MASTER_KEY is required (set it in .env)}
    restart: unless-stopped



