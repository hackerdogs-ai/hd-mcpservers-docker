version: "3.8"

services:
  aibom-mcp:
    image: hackerdogs/aibom-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aibom-mcp
    ports:
      - "8343:8343"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8343
    restart: unless-stopped
