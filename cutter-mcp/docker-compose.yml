version: "3.8"

services:
  cutter-mcp:
    image: hackerdogs/cutter-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cutter-mcp
    ports:
      - "8320:8320"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8320
    restart: unless-stopped
