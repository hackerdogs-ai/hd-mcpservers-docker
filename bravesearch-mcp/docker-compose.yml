version: "3.8"

services:
  bravesearch-mcp:
    image: hackerdogs/bravesearch-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bravesearch-mcp
    ports:
      - "8517:8517"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8517
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
    restart: unless-stopped
