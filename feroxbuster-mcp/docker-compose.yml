version: "3.8"

services:
  feroxbuster-mcp:
    image: hackerdogs/feroxbuster-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feroxbuster-mcp
    ports:
      - "8216:8216"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8216
    restart: unless-stopped
