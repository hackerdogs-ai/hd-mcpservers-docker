version: "3.8"
services:
  aws-dynamodb-mcp:
    image: hackerdogs/aws-dynamodb-mcp:latest
    build: .
    ports:
      - "8612:8612"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8612
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
