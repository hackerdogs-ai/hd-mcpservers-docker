version: "3.8"

services:
  trivy-mcp:
    image: hackerdogs/trivy-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trivy-mcp
    ports:
      - "8330:8330"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8330
    restart: unless-stopped
