services:
  abstract-mcp:
    build: .
    ports:
      - "8501:8501"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8501
      - ABSTRACT_PHONE_API_KEY=${ABSTRACT_PHONE_API_KEY:-}
      - ABSTRACT_EMAIL_API_KEY=${ABSTRACT_EMAIL_API_KEY:-}
      - ABSTRACT_IBAN_API_KEY=${ABSTRACT_IBAN_API_KEY:-}
      - ABSTRACT_VAT_API_KEY=${ABSTRACT_VAT_API_KEY:-}
      - ABSTRACT_IP_API_KEY=${ABSTRACT_IP_API_KEY:-}
      - ABSTRACT_HOLIDAYS_API_KEY=${ABSTRACT_HOLIDAYS_API_KEY:-}
      - ABSTRACT_EXCHANGE_API_KEY=${ABSTRACT_EXCHANGE_API_KEY:-}
      - ABSTRACT_COMPANY_API_KEY=${ABSTRACT_COMPANY_API_KEY:-}
      - ABSTRACT_TIMEZONE_API_KEY=${ABSTRACT_TIMEZONE_API_KEY:-}
