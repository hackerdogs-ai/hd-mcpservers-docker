version: "3.8"

services:
  acuvity-mcp-server-azure-mcp:
    image: hackerdogs/acuvity-mcp-server-azure-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-azure-mcp
    ports:
      - "8432:8432"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8432
    restart: unless-stopped
