version: "3.8"
services:
  aws-eks-mcp:
    image: hackerdogs/aws-eks-mcp:latest
    build: .
    ports:
      - "8614:8614"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8614
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
