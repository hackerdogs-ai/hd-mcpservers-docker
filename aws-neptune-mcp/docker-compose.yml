version: "3.8"
services:
  aws-neptune-mcp:
    image: hackerdogs/aws-neptune-mcp:latest
    build: .
    ports:
      - "8617:8617"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8617
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
