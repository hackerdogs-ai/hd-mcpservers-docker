version: "3.8"

services:
  lynis-mcp:
    image: hackerdogs/lynis-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lynis-mcp
    ports:
      - "8326:8326"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8326
    restart: unless-stopped
