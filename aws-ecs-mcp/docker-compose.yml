version: "3.8"
services:
  aws-ecs-mcp:
    image: hackerdogs/aws-ecs-mcp:latest
    build: .
    ports:
      - "8613:8613"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8613
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
