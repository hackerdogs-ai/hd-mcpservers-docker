version: "3.8"

services:
  subjack-mcp:
    image: hackerdogs/subjack-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subjack-mcp
    ports:
      - "8260:8260"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8260
    restart: unless-stopped
