version: "3.8"

services:
  acuvity-mcp-server-brave-search-mcp:
    image: hackerdogs/acuvity-mcp-server-brave-search-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-brave-search-mcp
    ports:
      - "8406:8406"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8406
    restart: unless-stopped
