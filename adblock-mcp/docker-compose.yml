version: "3.8"

services:
  adblock-mcp:
    image: hackerdogs/adblock-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adblock-mcp
    ports:
      - "8508:8508"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8508
    restart: unless-stopped
