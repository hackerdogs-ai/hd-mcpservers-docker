version: "3.8"

services:
  file-operations-mcp:
    image: hackerdogs/file-operations-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-operations-mcp
    ports:
      - "8522:8522"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8522
    restart: unless-stopped
