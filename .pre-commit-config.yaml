# Pre-commit configuration for MCP repository security scanning
# Run `pre-commit install` to set up git hooks locally
# Run `pre-commit run --all-files` to scan everything manually

fail_fast: false
default_stages: [commit]

exclude: |
  (?x)^(
    \.git/.*|
    node_modules/.*|
    \.venv/.*|
    __pycache__/.*|
    .*\.min\.js
  )$

repos:
  # Basic file hygiene checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key

  # Secret detection - blocks commits containing secrets/credentials
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        stages: [commit]
        args: [--verbose, --config=.gitleaks.toml]

  # Python security analysis - SAST for Python files
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args:
          - -r
          - --severity-level=medium
          - --confidence-level=medium
          - --skip=B101,B603
        types: [python]
        stages: [commit]

  # Dockerfile linting - blocks commits with insecure Dockerfile patterns
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args:
          - --config=.hadolint.yaml
        stages: [commit]

  # YAML linting - validates docker-compose files
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - --config-data
          - "{extends: relaxed, rules: {line-length: {max: 200}}}"
        types: [yaml]
        stages: [commit]
