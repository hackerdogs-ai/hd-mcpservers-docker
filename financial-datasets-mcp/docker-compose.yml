version: "3.8"

services:
  financial-datasets-mcp:
    image: hackerdogs/financial-datasets-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-datasets-mcp
    ports:
      - "8420:8420"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8420
    restart: unless-stopped
