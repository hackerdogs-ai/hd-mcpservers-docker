version: "3.8"
services:
  aws-iam-mcp:
    image: hackerdogs/aws-iam-mcp:latest
    build: .
    ports:
      - "8615:8615"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8615
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
