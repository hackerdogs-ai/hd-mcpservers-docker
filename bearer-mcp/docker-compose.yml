version: "3.8"

services:
  bearer-mcp:
    image: hackerdogs/bearer-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bearer-mcp
    ports:
      - "8360:8360"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8360
    restart: unless-stopped
