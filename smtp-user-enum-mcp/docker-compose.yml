version: "3.8"

services:
  smtp-user-enum-mcp:
    image: hackerdogs/smtp-user-enum-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smtp-user-enum-mcp
    ports:
      - "8325:8325"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8325
    restart: unless-stopped
