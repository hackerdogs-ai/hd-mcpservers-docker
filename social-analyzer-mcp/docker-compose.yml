version: "3.8"

services:
  social-analyzer-mcp:
    image: hackerdogs/social-analyzer-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-analyzer-mcp
    ports:
      - "8255:8255"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8255
    restart: unless-stopped
