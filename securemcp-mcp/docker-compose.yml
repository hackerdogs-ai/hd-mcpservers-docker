version: "3.8"

services:
  securemcp-mcp:
    image: hackerdogs/securemcp-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: securemcp-mcp
    ports:
      - "8297:8297"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8297
    restart: unless-stopped
