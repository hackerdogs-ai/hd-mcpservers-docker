version: "3.8"

services:
  sstimap-mcp:
    image: hackerdogs/sstimap-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sstimap-mcp
    ports:
      - "8289:8289"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8289
    restart: unless-stopped
