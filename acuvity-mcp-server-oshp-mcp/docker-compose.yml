version: "3.8"

services:
  acuvity-mcp-server-oshp-mcp:
    image: hackerdogs/acuvity-mcp-server-oshp-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-oshp-mcp
    ports:
      - "8441:8441"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8441
    restart: unless-stopped
