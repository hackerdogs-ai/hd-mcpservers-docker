version: "3.8"

services:
  acuvity-mcp-server-everything-mcp:
    image: hackerdogs/acuvity-mcp-server-everything-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-everything-mcp
    ports:
      - "8431:8431"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8431
    restart: unless-stopped
