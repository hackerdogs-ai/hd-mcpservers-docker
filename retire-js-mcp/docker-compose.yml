version: "3.8"

services:
  retire-js-mcp:
    image: hackerdogs/retire-js-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retire-js-mcp
    ports:
      - "8364:8364"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8364
    restart: unless-stopped
