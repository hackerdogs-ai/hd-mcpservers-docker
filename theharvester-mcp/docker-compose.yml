version: "3.8"

services:
  theharvester-mcp:
    image: hackerdogs/theharvester-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theharvester-mcp
    ports:
      - "8204:8204"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8204
    restart: unless-stopped
