version: "3.8"

services:
  acuvity-mcp-server-docker-mcp:
    image: hackerdogs/acuvity-mcp-server-docker-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-docker-mcp
    ports:
      - "8412:8412"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8412
    restart: unless-stopped
