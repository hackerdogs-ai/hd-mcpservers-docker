version: "3.8"

services:
  ghidra-mcp:
    image: hackerdogs/ghidra-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghidra-mcp
    ports:
      - "8240:8240"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8240
    restart: unless-stopped
