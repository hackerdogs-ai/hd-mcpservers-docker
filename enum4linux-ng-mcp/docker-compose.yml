version: "3.8"

services:
  enum4linux-ng-mcp:
    image: hackerdogs/enum4linux-ng-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enum4linux-ng-mcp
    ports:
      - "8210:8210"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8210
    restart: unless-stopped
