version: "3.8"

services:
  acuvity-mcp-server-slack-mcp:
    image: hackerdogs/acuvity-mcp-server-slack-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-slack-mcp
    ports:
      - "8455:8455"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8455
    restart: unless-stopped
