version: "3.8"
services:
  aws-aurora-dsql-mcp:
    image: hackerdogs/aws-aurora-dsql-mcp:latest
    build: .
    ports:
      - "8603:8603"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8603
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
