version: "3.8"

services:
  acuvity-mcp-server-bing-search-mcp:
    image: hackerdogs/acuvity-mcp-server-bing-search-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-bing-search-mcp
    ports:
      - "8405:8405"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8405
    restart: unless-stopped
