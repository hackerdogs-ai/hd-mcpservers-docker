version: "3.8"

services:
  ropgadget-mcp:
    image: hackerdogs/ropgadget-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ropgadget-mcp
    ports:
      - "8242:8242"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8242
    restart: unless-stopped
