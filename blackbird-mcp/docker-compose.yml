version: "3.8"

services:
  blackbird-mcp:
    image: hackerdogs/blackbird-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackbird-mcp
    ports:
      - "8220:8220"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8220
    restart: unless-stopped
