version: "3.8"
services:
  aws-network-mcp:
    image: hackerdogs/aws-network-mcp:latest
    build: .
    ports:
      - "8618:8618"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8618
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
