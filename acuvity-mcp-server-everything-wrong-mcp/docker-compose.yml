version: "3.8"

services:
  acuvity-mcp-server-everything-wrong-mcp:
    image: hackerdogs/acuvity-mcp-server-everything-wrong-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-everything-wrong-mcp
    ports:
      - "8418:8418"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8418
    restart: unless-stopped
