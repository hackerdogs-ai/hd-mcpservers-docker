version: "3.8"

services:
  gobuster-mcp:
    image: hackerdogs/gobuster-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gobuster-mcp
    ports:
      - "8213:8213"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8213
    restart: unless-stopped
