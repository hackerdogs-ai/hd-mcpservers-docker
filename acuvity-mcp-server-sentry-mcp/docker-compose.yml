version: "3.8"

services:
  acuvity-mcp-server-sentry-mcp:
    image: hackerdogs/acuvity-mcp-server-sentry-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acuvity-mcp-server-sentry-mcp
    ports:
      - "8452:8452"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8452
    restart: unless-stopped
