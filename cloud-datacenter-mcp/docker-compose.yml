version: "3.8"

services:
  cloud-datacenter-mcp:
    image: hackerdogs/cloud-datacenter-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-datacenter-mcp
    ports:
      - "8520:8520"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8520
    restart: unless-stopped
