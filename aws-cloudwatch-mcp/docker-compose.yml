version: "3.8"
services:
  aws-cloudwatch-mcp:
    image: hackerdogs/aws-cloudwatch-mcp:latest
    build: .
    ports:
      - "8608:8608"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8608
      - AWS_REGION=${AWS_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
